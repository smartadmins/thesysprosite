apiVersion: v1
kind: Service
metadata:
  name: thesyspro-service
  labels:
    app: thesyspro
spec:
  type: NodePort
  selector:
    app: thesyspro
  ports:
    - protocol: TCP
      port: 80          # Service port
      targetPort: 80    # Container port
      nodePort: 30007   # External port (range: 30000–32767)
