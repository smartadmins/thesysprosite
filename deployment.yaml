apiVersion: apps/v1
kind: Deployment
metadata:
  name: thesyspro-deployment
  labels:
    app: thesyspro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thesyspro
  template:
    metadata:
      labels:
        app: thesyspro
    spec:
      containers:
      - name: thesyspro-container
        image: ksudhy/$JOB_NAME:latest
        ports:
        - containerPort: 80
